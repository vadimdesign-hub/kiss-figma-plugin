<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --tb-bg: #ffffff;
      --btn-bg: #f0f0f0;
      --btn-hover: #e0e0e0;
      --btn-active: #d0d0d0;
      --label-color: #666;
      --label-hover: #111;
      --arrow-color: #999;
      --arrow-hover: #111;
      --stacked-label: #555;
      --check-border: #d0d0d0;
      --check-bg: #fff;
      --check-label: #999;
      --check-label-hover: #666;
      --set-bg: #ffffff;
      --set-title: #222;
      --set-label: #888;
      --set-card-bg: #fafafa;
      --set-card-border: #e0e0e0;
      --set-card-color: #555;
      --set-card-hover: #f0f0f0;
      --set-card-active-bg: #eef4ff;
      --set-card-active-border: #a0c8f0;
      --set-card-active-color: #1a6dd4;
      --svg-stroke: #888;
      --faq-bg: #ffffff;
      --faq-header-bg: #ffffff;
      --faq-header-border: #eee;
      --faq-header-title: #111;
      --faq-close-color: #999;
      --faq-close-hover-bg: #f0f0f0;
      --faq-sidebar-border: #eee;
      --faq-scrollbar: #ddd;
      --faq-tab-color: #555;
      --faq-tab-hover-bg: #f5f5f5;
      --faq-tab-hover-color: #222;
      --faq-tab-active-bg: #f0f0f0;
      --faq-tab-active-color: #111;
      --faq-page-title: #111;
      --faq-desc-color: #444;
      --faq-section-label: #aaa;
      --faq-howto-bg: #f7f7f7;
      --faq-howto-border: #eee;
      --faq-howto-color: #333;
      --faq-divider: #eee;
    }

    :root.dark {
      --tb-bg: #2a2a2a;
      --btn-bg: #3a3a3a;
      --btn-hover: #4a4a4a;
      --btn-active: #555555;
      --label-color: #aaa;
      --label-hover: #eee;
      --arrow-color: #888;
      --arrow-hover: #eee;
      --stacked-label: #aaa;
      --check-border: #555;
      --check-bg: #333;
      --check-label: #888;
      --check-label-hover: #bbb;
      --set-bg: #2a2a2a;
      --set-title: #e0e0e0;
      --set-label: #999;
      --set-card-bg: #333;
      --set-card-border: #555;
      --set-card-color: #bbb;
      --set-card-hover: #3e3e3e;
      --set-card-active-bg: #1e2d42;
      --set-card-active-border: #4a7ab5;
      --set-card-active-color: #7ab8ff;
      --svg-stroke: #bbb;
      --faq-bg: #1e1e1e;
      --faq-header-bg: #1e1e1e;
      --faq-header-border: #2e2e2e;
      --faq-header-title: #ffffff;
      --faq-close-color: #888;
      --faq-close-hover-bg: #2e2e2e;
      --faq-sidebar-border: #2e2e2e;
      --faq-scrollbar: #3a3a3a;
      --faq-tab-color: #aaa;
      --faq-tab-hover-bg: #2a2a2a;
      --faq-tab-hover-color: #e0e0e0;
      --faq-tab-active-bg: #2d2d2d;
      --faq-tab-active-color: #ffffff;
      --faq-page-title: #ffffff;
      --faq-desc-color: #b0b0b0;
      --faq-section-label: #555;
      --faq-howto-bg: #252525;
      --faq-howto-border: #2e2e2e;
      --faq-howto-color: #c0c0c0;
      --faq-divider: #282828;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", sans-serif;
      background: #1e1e1e;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── HEADER ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      padding: 16px 20px;
      border-bottom: 1px solid var(--faq-header-border);
      background: var(--faq-header-bg);
      flex-shrink: 0;
    }

    .header-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--faq-header-title);
      letter-spacing: 0.01em;
    }

    .close-btn {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      width: 28px;
      height: 28px;
      border: none;
      background: transparent;
      cursor: pointer;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--faq-close-color);
      transition: background 0.15s, color 0.15s;
    }

    .close-btn:hover {
      background: var(--faq-close-hover-bg);
      color: var(--faq-header-title);
    }

    .close-btn svg {
      width: 14px;
      height: 14px;
    }

    /* ── BODY ── */
    .body {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── SIDEBAR ── */
    .sidebar {
      width: 220px;
      flex-shrink: 0;
      border-right: 1px solid var(--faq-sidebar-border);
      overflow-y: auto;
      padding: 8px 0;
    }

    .sidebar::-webkit-scrollbar { width: 4px; }
    .sidebar::-webkit-scrollbar-track { background: transparent; }
    .sidebar::-webkit-scrollbar-thumb { background: var(--faq-scrollbar); border-radius: 2px; }

    .tab {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 16px;
      cursor: pointer;
      border-radius: 6px;
      margin: 1px 6px;
      transition: background 0.12s;
      font-size: 12px;
      color: var(--faq-tab-color);
      line-height: 1.3;
    }

    .tab:hover {
      background: var(--faq-tab-hover-bg);
      color: var(--faq-tab-hover-color);
    }

    .tab.active {
      background: var(--faq-tab-active-bg);
      color: var(--faq-tab-active-color);
    }

    .tab-icon {
      font-size: 16px;
      flex-shrink: 0;
      width: 20px;
      text-align: center;
    }

    .tab-label {
      flex: 1;
    }

    /* ── CONTENT ── */
    .content {
      flex: 1;
      overflow-y: auto;
      padding: 28px 32px;
    }

    .content::-webkit-scrollbar { width: 4px; }
    .content::-webkit-scrollbar-track { background: transparent; }
    .content::-webkit-scrollbar-thumb { background: var(--faq-scrollbar); border-radius: 2px; }

    .page {
      display: none;
    }

    .page.active {
      display: block;
    }

    .page-icon {
      font-size: 32px;
      margin-bottom: 12px;
    }

    .btn-preview {
      display: inline-flex;
      align-items: flex-start;
      gap: 4px;
      margin-bottom: 16px;
    }
    .btn-preview-item {
      background: var(--btn-bg);
      border-radius: 6px;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: space-between;
      padding: 5px 0 5px 6px;
      height: 50px;
      min-width: 68px;
      position: relative;
      box-sizing: border-box;
    }
    .btn-preview-item.icon-only {
      width: 42px;
      min-width: 42px;
      align-items: center;
      justify-content: center;
      padding: 0;
    }
    .btn-preview-item .bp-icon {
      font-size: 18px;
      line-height: 1;
      display: inline-flex;
      align-items: center;
    }
    .btn-preview-item .bp-label {
      font-size: 10px;
      color: var(--label-color);
    }
    .btn-preview-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 2px;
      width: 88px;
      height: 50px;
    }
    .bp-grid-btn {
      width: calc(50% - 1px);
      height: calc(50% - 1px);
      background: var(--btn-bg);
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .bp-check {
      position: absolute;
      top: 4px;
      right: 4px;
      width: 12px;
      height: 12px;
      border: 1.5px solid var(--check-border);
      border-radius: 3px;
      background: var(--check-bg);
    }
    .bp-check-row {
      position: absolute;
      display: flex;
      align-items: center;
      gap: 3px;
      right: 4px;
    }
    .bp-check-row.row-top { top: 5px; }
    .bp-check-row.row-bottom { top: 22px; }
    .bp-check-row span {
      font-size: 8px;
      color: var(--check-label);
    }
    .bp-check-sm {
      width: 12px;
      height: 12px;
      border: 1.5px solid var(--check-border);
      border-radius: 3px;
      background: var(--check-bg);
      flex-shrink: 0;
    }

    .page-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--faq-page-title);
      margin-bottom: 16px;
    }

    .description {
      font-size: 13px;
      line-height: 1.7;
      color: var(--faq-desc-color);
      margin-bottom: 20px;
    }

    .section-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--faq-section-label);
      margin-bottom: 8px;
      margin-top: 20px;
    }

    .how-to {
      background: var(--faq-howto-bg);
      border: 1px solid var(--faq-howto-border);
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 12.5px;
      line-height: 1.6;
      color: var(--faq-howto-color);
    }

    .divider {
      height: 1px;
      background: var(--faq-divider);
      margin: 20px 0;
    }

    /* ── TOOLBAR MODE ── */
    #toolbar {
      display: none;
      align-items: flex-start;
      gap: 4px;
      padding: 4px;
      background: var(--tb-bg);
    }

    .tool-btn {
      width: 68px;
      height: 50px;
      border: none;
      border-radius: 6px;
      background: var(--btn-bg);
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: space-between;
      transition: background 0.12s, transform 0.1s, height 0.15s ease-out, padding 0.15s ease-out;
      flex-shrink: 0;
      padding: 5px 0 5px 6px;
      position: relative;
    }

    .tool-btn:hover {
      background: var(--btn-hover);
    }

    .tool-btn:active {
      transform: scale(0.92);
      background: var(--btn-active);
    }

    #toolbar.compact .tool-btn {
      height: 25px;
      padding: 5px 0 0 6px;
      overflow: hidden;
    }
    #toolbar.compact.expanded .tool-btn {
      height: 50px;
      padding: 5px 0 5px 6px;
      overflow: visible;
    }
    #toolbar.compact .arrow-btn {
      height: 25px;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #toolbar.compact.expanded .arrow-btn {
      height: 50px;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #toolbar.compact .btn-label {
      display: none;
    }
    #toolbar.compact.expanded .btn-label {
      display: block;
    }
    #toolbar.compact .tool-grid {
      flex-direction: row;
      flex-wrap: nowrap;
      height: 25px;
      width: 88px;
      transition: height 0.15s ease-out;
    }
    #toolbar.compact .tool-grid-btn {
      width: 20px;
      height: 25px;
      transition: background 0.12s, width 0.15s ease-out, height 0.15s ease-out;
    }
    #toolbar.compact.expanded .tool-grid {
      flex-wrap: wrap;
      height: 50px;
      width: 88px;
    }
    #toolbar.compact.expanded .tool-grid-btn {
      width: calc(50% - 1px);
      height: calc(50% - 1px);
    }
    #toolbar.compact .tool-group {
      height: 25px;
      transition: height 0.15s ease-out;
    }
    #toolbar.compact.expanded .tool-group {
      height: 50px;
    }

    .btn-icon {
      font-size: 18px;
      line-height: 1;
      display: inline-flex;
      align-items: center;
    }

    .btn-label {
      font-size: 10px;
      color: var(--label-color);
      text-align: left;
      white-space: nowrap;
    }

    .tool-btn:hover .btn-label {
      color: var(--label-hover);
    }

    .arrow-btn {
      width: 24px;
      font-size: 20px;
      color: var(--arrow-color);
      align-items: center;
      justify-content: center;
      padding: 0;
      transition: background 0.12s, height 0.15s ease-out;
    }

    .arrow-btn:hover {
      color: var(--arrow-hover);
    }

    .tool-group {
      display: flex;
      flex-direction: column;
      gap: 2px;
      flex-shrink: 0;
    }

    .tool-group {
      height: 50px;
    }

    .tool-btn-stacked {
      flex: 1;
      border: none;
      border-radius: 5px;
      background: var(--btn-bg);
      cursor: pointer;
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 5px;
      padding: 0 8px;
      transition: background 0.12s;
      white-space: nowrap;
      overflow: hidden;
    }

    .tool-btn-stacked:hover { background: var(--btn-hover); }
    .tool-btn-stacked:active { background: var(--btn-active); }

    .tool-btn-stacked .btn-icon { font-size: 15px; line-height: 1; }
    .tool-btn-stacked .btn-label { font-size: 11px; color: var(--stacked-label); }
    .tool-btn-stacked:hover .btn-label { color: var(--label-hover); }

    .tool-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 2px;
      width: 88px;
      height: 50px;
      flex-shrink: 0;
    }
    .tool-grid-btn {
      width: calc(50% - 1px);
      height: calc(50% - 1px);
      border: none;
      border-radius: 4px;
      background: var(--btn-bg);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      transition: background 0.12s;
      font-size: 12px;
      line-height: 1;
    }
    .tool-grid-btn:hover { background: var(--btn-hover); }
    .tool-grid-btn:active { background: var(--btn-active); }

    .tool-btn { position: relative; user-select: none; }
    .tool-btn.dragging { opacity: 0.35; }
    .drop-indicator {
      width: 2px;
      min-width: 2px;
      height: 38px;
      background: #1f8fff;
      border-radius: 2px;
      flex-shrink: 0;
      pointer-events: none;
      align-self: center;
      display: none;
    }
    .btn-kbd-check {
      position: absolute;
      top: 4px;
      right: 4px;
      width: 14px;
      height: 14px;
      cursor: pointer;
      accent-color: #1f8fff;
      margin: 0;
      z-index: 1;
      appearance: none;
      -webkit-appearance: none;
      border: 1.5px solid var(--check-border);
      border-radius: 3px;
      background: var(--check-bg);
      transition: border-color 0.15s, background 0.15s;
    }
    .btn-check-row {
      position: absolute;
      display: flex;
      align-items: center;
      gap: 3px;
      right: 4px;
      z-index: 1;
    }
    .btn-check-row.row-top { top: 5px; }
    .btn-check-row.row-bottom { top: 22px; }
    .btn-check-row label {
      font-size: 9px;
      color: var(--check-label);
      cursor: pointer;
      white-space: nowrap;
      user-select: none;
    }
    .btn-check-row:hover label { color: var(--check-label-hover); }
    .btn-check-sm {
      width: 14px;
      height: 14px;
      cursor: pointer;
      margin: 0;
      appearance: none;
      -webkit-appearance: none;
      border: 1.5px solid var(--check-border);
      border-radius: 3px;
      background: var(--check-bg);
      transition: border-color 0.15s, background 0.15s;
      flex-shrink: 0;
    }
    .btn-check-sm:checked {
      background: #deeeff;
      border-color: #a0c8f0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 10 10' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M2 5l2.5 2.5L8 3' stroke='%231f8fff' stroke-width='1.5' fill='none' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
      background-size: 10px;
      background-repeat: no-repeat;
      background-position: center;
    }

    .btn-kbd-check:checked {
      background: #deeeff;
      border-color: #a0c8f0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 10 10' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M2 5l2.5 2.5L8 3' stroke='%231f8fff' stroke-width='1.5' fill='none' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
      background-size: 10px;
      background-repeat: no-repeat;
      background-position: center;
    }
    /* ── SETTINGS PANEL ── */
    #settings {
      display: none;
      flex-direction: column;
      gap: 14px;
      padding: 16px 24px 12px;
      background: var(--set-bg);
      width: 100%;
      height: 100vh;
      box-sizing: border-box;
    }
    .settings-title {
      font-size: 16px;
      font-weight: 700;
      color: var(--set-title);
    }
    .settings-section {}
    .settings-label {
      font-size: 12px;
      color: var(--set-label);
      margin-bottom: 10px;
    }
    .settings-options {
      display: flex;
      gap: 10px;
    }
    .settings-card {
      flex: 1 1 0;
      min-width: 0;
      border: 2px solid var(--set-card-border);
      border-radius: 10px;
      background: var(--set-card-bg);
      cursor: pointer;
      padding: 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      transition: all 0.15s;
      font-size: 12px;
      color: var(--set-card-color);
    }
    .settings-card:hover { background: var(--set-card-hover); }
    .settings-card.active {
      background: var(--set-card-active-bg);
      border-color: var(--set-card-active-border);
      color: var(--set-card-active-color);
    }
    .settings-save {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      background: #1a6dd4;
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    .settings-save:hover { background: #1558b0; }

    .settings-card-preview {
      display: flex;
      gap: 6px;
      align-items: center;
      justify-content: center;
      min-height: 28px;
    }
  </style>
</head>
<body>

  <!-- TOOLBAR -->
  <div id="toolbar"></div>
  <!-- SETTINGS -->
  <div id="settings">
    <div class="settings-title">Настройки</div>
    <div class="settings-section">
      <div class="settings-label">Стиль иконок</div>
      <div class="settings-options">
        <button class="settings-card active" id="optSvg">
          <div class="settings-card-preview" id="previewSvg"></div>
          <span>SVG</span>
        </button>
        <button class="settings-card" id="optEmoji">
          <div class="settings-card-preview" id="previewEmoji"></div>
          <span>Emoji</span>
        </button>
      </div>
    </div>
    <div class="settings-section">
      <div class="settings-label">Тема</div>
      <div class="settings-options">
        <button class="settings-card active" id="optLight">
          <div class="settings-card-preview" style="display:flex;gap:4px;align-items:center">
            <div style="width:28px;height:18px;border-radius:4px;background:#f0f0f0;border:1px solid #ddd"></div>
            <div style="width:28px;height:18px;border-radius:4px;background:#e0e0e0;border:1px solid #ddd"></div>
          </div>
          <span>Светлая</span>
        </button>
        <button class="settings-card" id="optDark">
          <div class="settings-card-preview" style="display:flex;gap:4px;align-items:center">
            <div style="width:28px;height:18px;border-radius:4px;background:#3a3a3a;border:1px solid #555"></div>
            <div style="width:28px;height:18px;border-radius:4px;background:#4a4a4a;border:1px solid #555"></div>
          </div>
          <span>Тёмная</span>
        </button>
      </div>
    </div>
    <div class="settings-section">
      <div class="settings-label">Окно</div>
      <div class="settings-options">
        <button class="settings-card active" id="optNormal">
          <div class="settings-card-preview" style="display:flex;gap:4px;align-items:center">
            <div style="width:28px;height:18px;border-radius:4px;background:var(--btn-bg);border:1px solid var(--check-border)"></div>
            <div style="width:28px;height:18px;border-radius:4px;background:var(--btn-bg);border:1px solid var(--check-border)"></div>
          </div>
          <span>Обычное</span>
        </button>
        <button class="settings-card" id="optDynamic">
          <div class="settings-card-preview" style="display:flex;gap:4px;align-items:flex-end">
            <div style="width:28px;height:10px;border-radius:4px;background:var(--btn-bg);border:1px solid var(--check-border)"></div>
            <div style="width:28px;height:18px;border-radius:4px;background:var(--btn-hover);border:1px solid var(--check-border)"></div>
          </div>
          <span>Динамическое</span>
        </button>
      </div>
    </div>
    <button class="settings-save" id="settingsSave" style="display:none">Сохранить</button>
  </div>

  <!-- HEADER -->
  <div class="header">
    <span class="header-title">FAQ: описание функционала плагинов</span>
  </div>

  <!-- BODY -->
  <div class="body">

    <!-- SIDEBAR -->
    <div class="sidebar" id="sidebar"></div>

    <!-- CONTENT -->
    <div class="content" id="content"></div>

  </div>

  <script>

    menu.forEach((item, index) => {
      // Tab
      const tab = document.createElement("div");
      tab.className = "tab" + (index === 0 ? " active" : "");
      tab.dataset.index = index;
      tab.innerHTML = `<span class="tab-icon">${item.icon}</span><span class="tab-label">${item.label}</span>`;
      tab.addEventListener("click", () => activate(index));
      sidebar.appendChild(tab);

      // Page
      const page = document.createElement("div");
      page.className = "page" + (index === 0 ? " active" : "");
      page.dataset.index = index;
      page.innerHTML = `
        <div class="page-preview">${item.getPreview ? item.getPreview("svg") : `<div class="page-icon">${item.icon}</div>`}</div>
        <div class="page-title">${item.label}</div>
        <div class="description">${item.description.replace(/\n/g, "<br>")}</div>
        <div class="divider"></div>
        <div class="section-label">Как использовать</div>
        <div class="how-to">${item.how}</div>
      `;
      content.appendChild(page);
    });

    function activate(index) {
      document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
      document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
      document.querySelector(`.tab[data-index="${index}"]`).classList.add("active");
      document.querySelector(`.page[data-index="${index}"]`).classList.add("active");
    }
  </script>

  <script>
    const tools = [
      { icon: IC.grid,     emojiIcon: "⚡", label: "Секции",    command: "alignAllSections" },
      { icon: IC.chevronL, emojiIcon: "⬅️", command: "expandSectionLeft", iconOnly: true, width: 32, hasExpandCheck: true },
      { icon: IC.chevronR, emojiIcon: "➡️", command: "expandSection",     iconOnly: true, width: 32, hasExpandCheck: true },
      { icon: IC.contrast, emojiIcon: "📐", label: "Тёмная",   command: "autosection" },
      { icon: IC.frame,    emojiIcon: "🗂️", label: "Обернуть", command: "wrap"        },
      { icon: IC.code,     emojiIcon: "🚀", label: "Dev",       command: "readyForDev"      },
      { icon: IC.swap,     emojiIcon: "🔄", label: "Замена",   command: "replace"          },
      { icon: IC.scissors, emojiIcon: "✂️", label: "Нарезка",  command: "slice", width: 120 },
      { icon: IC.image,    emojiIcon: "🖼️", label: "В арт",    command: "art"              },
      { icon: IC.search,   emojiIcon: "🔍", label: "Похожие",  command: "findSimilar", hasSectionCheck: true },
      { icon: IC.translate, emojiIcon: "🌐", label: "Перевод", command: "translate"        },
      { type: "grid", command: "tagGrid", width: 88, buttons: [
        { icon: '<svg width="14" height="14"><circle cx="7" cy="7" r="6" fill="#F59E0B"/></svg>', emojiIcon: "🟠", command: "floatingTag" },
        { icon: '<svg width="14" height="14"><circle cx="7" cy="7" r="6" fill="#EF4444"/></svg>', emojiIcon: "🔴", command: "urgentTag" },
        { icon: '<svg width="14" height="14"><circle cx="7" cy="7" r="6" fill="#22C55E"/></svg>', emojiIcon: "🟢", command: "doneTag" },
        { icon: '<svg width="14" height="14"><circle cx="7" cy="7" r="6" fill="#3B82F6"/></svg>', emojiIcon: "🔵", command: "reviewTag" },
      ]},
    ];

    let expandChkR = null, expandChkL = null;

    window.onmessage = (event) => {
      const msg = event.data.pluginMessage;
      if (!msg) return;

      if (msg.type === "copyToClipboard") {
        navigator.clipboard.writeText(msg.text).then(() => {
          parent.postMessage({ pluginMessage: { type: "clipboardDone" } }, "*");
        });
        return;
      }

      if (msg.type === "translateTexts") {
        (async () => {
          const results = [];
          for (const text of msg.texts) {
            const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=${msg.lang}&dt=t&q=${encodeURIComponent(text)}`;
            try {
              const resp = await fetch(url);
              const data = await resp.json();
              results.push(data[0].map(s => s[0]).join(""));
            } catch (e) {
              results.push(text);
            }
          }
          parent.postMessage({ pluginMessage: { type: "translationResult", ids: msg.ids, translations: results } }, "*");
        })();
        return;
      }

      if (msg.type === "requestCopyLink") {
        let fileKey = msg.fileKey;

        // Если fileKey не пришёл — пробуем вытащить из document.referrer
        if (!fileKey) {
          const match = document.referrer.match(/figma\.com\/(?:file|design)\/([A-Za-z0-9]+)/);
          fileKey = match ? match[1] : null;
        }

        if (fileKey) {
          const link = "https://www.figma.com/design/" + fileKey + "?node-id=" + msg.nodeId;
          navigator.clipboard.writeText(link).then(() => {
            parent.postMessage({ pluginMessage: { type: "clipboardDone" } }, "*");
          });
        } else {
          parent.postMessage({ pluginMessage: { type: "clipboardFail" } }, "*");
        }
        return;
      }

      if (msg.type === "showFaq") {
        document.getElementById("toolbar").style.display = "none";
        document.getElementById("settings").style.display = "none";
        document.querySelector(".header").style.display = "";
        document.querySelector(".body").style.display = "";
        const faqTheme = msg.savedTheme || "light";
        document.documentElement.classList.toggle("dark", faqTheme === "dark");
        document.body.style.background = "var(--faq-bg)";
        // Update FAQ icons and previews based on icon style
        const faqIconStyle = msg.savedIconStyle || "svg";
        document.querySelectorAll(".tab").forEach((tab, i) => {
          if (menu[i]) {
            const ic = tab.querySelector(".tab-icon");
            if (ic) ic.innerHTML = faqIconStyle === "emoji" && menu[i].emojiIcon ? menu[i].emojiIcon : menu[i].icon;
          }
        });
        document.querySelectorAll(".page").forEach((page, i) => {
          if (menu[i]) {
            const pv = page.querySelector(".page-preview");
            if (pv) pv.innerHTML = menu[i].getPreview ? menu[i].getPreview(faqIconStyle) : (faqIconStyle === "emoji" && menu[i].emojiIcon ? `<div class="page-icon">${menu[i].emojiIcon}</div>` : `<div class="page-icon">${menu[i].icon}</div>`);
          }
        });
        return;
      }

      if (msg.type === "showSettings") {
        document.getElementById("toolbar").style.display = "none";
        document.querySelector(".header").style.display = "none";
        document.querySelector(".body").style.display = "none";
        const sp = document.getElementById("settings");
        sp.style.display = "flex";
        document.body.style.background = "var(--set-bg)";

        // Fill previews
        const previews = [IC.grid, IC.contrast, IC.frame, IC.scissors, IC.search];
        const emojis = ["⚡", "📐", "🗂️", "✂️", "🔍"];
        document.getElementById("previewSvg").innerHTML = previews.join("");
        document.getElementById("previewEmoji").innerHTML = emojis.map(e => `<span style="font-size:16px">${e}</span>`).join("");

        const optS = document.getElementById("optSvg");
        const optE = document.getElementById("optEmoji");
        const optL = document.getElementById("optLight");
        const optD = document.getElementById("optDark");
        const optN = document.getElementById("optNormal");
        const optDy = document.getElementById("optDynamic");
        const saveBtn = document.getElementById("settingsSave");

        const curIcon = msg.savedIconStyle || "svg";
        const curTheme = msg.savedTheme || "light";
        const curDynamic = msg.savedDynamic || "normal";
        let chosenIcon = curIcon;
        let chosenTheme = curTheme;
        let chosenDynamic = curDynamic;

        // Apply current theme class
        document.documentElement.classList.toggle("dark", curTheme === "dark");

        optS.classList.toggle("active", curIcon === "svg");
        optE.classList.toggle("active", curIcon === "emoji");
        optL.classList.toggle("active", curTheme === "light");
        optD.classList.toggle("active", curTheme === "dark");
        optN.classList.toggle("active", curDynamic === "normal");
        optDy.classList.toggle("active", curDynamic === "dynamic");
        saveBtn.style.display = "none";

        function updateSave() {
          const changed = chosenIcon !== curIcon || chosenTheme !== curTheme || chosenDynamic !== curDynamic;
          saveBtn.style.display = changed ? "block" : "none";
          parent.postMessage({ pluginMessage: { type: "resize", width: 360, height: changed ? 480 : 430 } }, "*");
        }

        optS.onclick = () => { chosenIcon = "svg"; optS.classList.add("active"); optE.classList.remove("active"); updateSave(); };
        optE.onclick = () => { chosenIcon = "emoji"; optE.classList.add("active"); optS.classList.remove("active"); updateSave(); };
        optL.onclick = () => { chosenTheme = "light"; optL.classList.add("active"); optD.classList.remove("active"); document.documentElement.classList.remove("dark"); updateSave(); };
        optD.onclick = () => { chosenTheme = "dark"; optD.classList.add("active"); optL.classList.remove("active"); document.documentElement.classList.add("dark"); updateSave(); };
        optN.onclick = () => { chosenDynamic = "normal"; optN.classList.add("active"); optDy.classList.remove("active"); updateSave(); };
        optDy.onclick = () => { chosenDynamic = "dynamic"; optDy.classList.add("active"); optN.classList.remove("active"); updateSave(); };
        saveBtn.onclick = () => {
          parent.postMessage({ pluginMessage: { type: "saveIconStyle", style: chosenIcon } }, "*");
          parent.postMessage({ pluginMessage: { type: "saveTheme", theme: chosenTheme } }, "*");
          parent.postMessage({ pluginMessage: { type: "saveDynamic", value: chosenDynamic } }, "*");
          parent.postMessage({ pluginMessage: { type: "settingsDone" } }, "*");
        };
        return;
      }

      if (msg.type === "frameSelected") {
        const show = msg.value ? "block" : "none";
        if (expandChkR) expandChkR.style.display = show;
        if (expandChkL) expandChkL.style.display = show;
        return;
      }

      if (msg.type !== "toolbar") return;

      const tbEl = document.getElementById("toolbar");
      tbEl.style.display = "flex";
      document.getElementById("settings").style.display = "none";
      document.querySelector(".header").style.display = "none";
      document.querySelector(".body").style.display = "none";

      let iconStyle = msg.savedIconStyle || "svg";
      const theme = msg.savedTheme || "light";
      const isDynamic = msg.savedDynamic === "dynamic";
      document.documentElement.classList.toggle("dark", theme === "dark");
      document.body.style.background = "var(--tb-bg)";
      tbEl.classList.toggle("compact", isDynamic);

      const VISIBLE = 5;
      const BTN_W = 68, ICON_W = 42, ARROW_W = 24, GAP = 4, PAD = 4;

      function btnWidth(t) {
        return t.width || (t.iconOnly ? ICON_W : BTN_W);
      }

      function calcWidth(visibleTools) {
        const sum = visibleTools.reduce((acc, t) => acc + btnWidth(t), 0);
        const gaps = (visibleTools.length - 1) * GAP;
        return PAD * 2 + sum + gaps + GAP + ARROW_W;
      }

      function getIcon(t) {
        return iconStyle === "emoji" && t.emojiIcon ? t.emojiIcon : t.icon;
      }

      // Применяем сохранённый порядок
      if (msg.savedOrder) {
        const orderMap = {};
        msg.savedOrder.forEach((cmd, idx) => { orderMap[cmd] = idx; });
        tools.sort((a, b) => {
          const ka = a.command || "zzz";
          const kb = b.command || "zzz";
          return (orderMap[ka] ?? 999) - (orderMap[kb] ?? 999);
        });
      }

      const toolbar = document.getElementById("toolbar");
      let expanded = false;

      const btnEls = tools.map(t => {
        if (t.type === "group") {
          const group = document.createElement("div");
          group.className = "tool-group";
          group.style.width = t.width + "px";
          t.buttons.forEach(b => {
            const btn = document.createElement("button");
            btn.className = "tool-btn-stacked";
            btn.innerHTML = `<span class="btn-icon">${getIcon(b)}</span><span class="btn-label">${b.label}</span>`;
            btn.addEventListener("click", () => {
              parent.postMessage({ pluginMessage: { type: "run", command: b.command } }, "*");
            });
            group.appendChild(btn);
          });
          toolbar.appendChild(group);
          return group;
        }
        if (t.type === "grid") {
          const grid = document.createElement("div");
          grid.className = "tool-grid";
          t.buttons.forEach(b => {
            const btn = document.createElement("button");
            btn.className = "tool-grid-btn";
            btn.innerHTML = getIcon(b);
            btn.addEventListener("click", () => {
              parent.postMessage({ pluginMessage: { type: "run", command: b.command } }, "*");
            });
            grid.appendChild(btn);
          });
          toolbar.appendChild(grid);
          return grid;
        }
        const btn = document.createElement("button");
        btn.className = "tool-btn";
        btn.style.width = btnWidth(t) + "px";
        if (t.shortcut) {
          btn.style.background = "#1f8fff";
          btn.style.borderRadius = "8px";
          btn.innerHTML = `<span style="font-size:11px;font-weight:600;color:#fff;letter-spacing:0.02em">${getIcon(t)}</span>`;
        } else if (t.iconOnly) {
          btn.style.alignItems = "center";
          btn.style.justifyContent = "center";
          btn.style.padding = "0";
          btn.innerHTML = `<span class="btn-icon" style="font-size:18px">${getIcon(t)}</span>`;
          if (t.hasExpandCheck) {
            const echk = document.createElement("input");
            echk.type = "checkbox";
            echk.className = "btn-kbd-check";
            echk.checked = true;
            echk.style.display = "none";
            echk.title = "Дублировать фрейм";
            echk.addEventListener("click", e => {
              e.stopPropagation();
              parent.postMessage({ pluginMessage: { type: "saveExpandCheck", command: t.command, checked: echk.checked } }, "*");
            });
            btn.appendChild(echk);
            if (t.command === "expandSection") expandChkR = echk;
            if (t.command === "expandSectionLeft") expandChkL = echk;
          }
        } else {
          btn.innerHTML = `<span class="btn-icon">${getIcon(t)}</span><span class="btn-label">${t.label}</span>`;
        }
        if (t.hasExpandCheck) {
          btn.addEventListener("click", () => {
            const chk = t.command === "expandSection" ? expandChkR : expandChkL;
            parent.postMessage({ pluginMessage: { type: "run", command: t.command, duplicate: chk ? chk.checked : true } }, "*");
          });
        } else if (t.command === "autosection") {
          const row = document.createElement("div");
          row.className = "btn-check-row row-top";
          const kbdIcon = document.createElement("span");
          kbdIcon.style.cssText = "font-size:10px;color:#999;line-height:1;cursor:pointer;";
          kbdIcon.innerHTML = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#999" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="14" rx="2"/><line x1="6" y1="8" x2="6" y2="8"/><line x1="10" y1="8" x2="10" y2="8"/><line x1="14" y1="8" x2="14" y2="8"/><line x1="18" y1="8" x2="18" y2="8"/><line x1="6" y1="12" x2="6" y2="12"/><line x1="18" y1="12" x2="18" y2="12"/><line x1="9" y1="16" x2="15" y2="16"/></svg>`;
          kbdIcon.addEventListener("click", (e) => { e.stopPropagation(); chk.click(); });
          const chk = document.createElement("input");
          chk.type = "checkbox";
          chk.className = "btn-check-sm";
          chk.title = "Переключать клавиатуру в тёмную";
          chk.addEventListener("click", e => e.stopPropagation());
          row.appendChild(kbdIcon);
          row.appendChild(chk);
          btn.appendChild(row);
          btn.addEventListener("click", () => {
            parent.postMessage({ pluginMessage: { type: "run", command: t.command, withKeyboard: chk.checked } }, "*");
          });
        } else if (t.command === "slice") {
          const row1 = document.createElement("div");
          row1.className = "btn-check-row row-top";
          const lbl1 = document.createElement("label");
          lbl1.textContent = "2.67";
          const chk1 = document.createElement("input");
          chk1.type = "checkbox";
          chk1.className = "btn-check-sm";
          chk1.title = "Масштаб 2.67";
          lbl1.addEventListener("click", () => { chk1.click(); });
          row1.appendChild(lbl1);
          row1.appendChild(chk1);
          chk1.addEventListener("click", e => { e.stopPropagation(); if (chk1.checked) chk2.checked = false; });
          btn.appendChild(row1);

          const row2 = document.createElement("div");
          row2.className = "btn-check-row row-bottom";
          const lbl2 = document.createElement("label");
          lbl2.textContent = "Продукт";
          const chk2 = document.createElement("input");
          chk2.type = "checkbox";
          chk2.className = "btn-check-sm";
          chk2.title = "Продукт (80/120/240)";
          lbl2.addEventListener("click", () => { chk2.click(); });
          row2.appendChild(lbl2);
          row2.appendChild(chk2);
          chk2.addEventListener("click", e => { e.stopPropagation(); if (chk2.checked) chk1.checked = false; });
          btn.appendChild(row2);

          btn.addEventListener("click", () => {
            parent.postMessage({ pluginMessage: { type: "run", command: "slice", scale267: chk1.checked, product: chk2.checked } }, "*");
            chk1.checked = false;
            chk2.checked = false;
          });
        } else if (t.hasSectionCheck) {
          const schk = document.createElement("input");
          schk.type = "checkbox";
          schk.className = "btn-kbd-check";
          schk.title = "Искать только в секции";
          schk.addEventListener("click", e => e.stopPropagation());
          btn.appendChild(schk);
          btn.addEventListener("click", () => {
            parent.postMessage({ pluginMessage: { type: "run", command: t.command, sectionOnly: schk.checked } }, "*");
          });
        } else {
          btn.addEventListener("click", () => {
            parent.postMessage({ pluginMessage: { type: "run", command: t.command } }, "*");
          });
        }
        toolbar.appendChild(btn);
        return btn;
      });

      // Restore saved expand checkbox states
      if (msg.savedExpandChkR !== undefined && msg.savedExpandChkR !== null && expandChkR) expandChkR.checked = msg.savedExpandChkR;
      if (msg.savedExpandChkL !== undefined && msg.savedExpandChkL !== null && expandChkL) expandChkL.checked = msg.savedExpandChkL;

      const arrow = document.createElement("button");
      arrow.className = "tool-btn arrow-btn";
      arrow.textContent = "›";
      toolbar.appendChild(arrow);

      let currentTbWidth = 320;
      let isHoverExpanded = false;
      function applyState() {
        btnEls.forEach((btn, i) => {
          btn.style.display = (expanded || i < VISIBLE) ? "flex" : "none";
        });
        arrow.textContent = expanded ? "‹" : "›";
        const visibleTools = expanded ? tools : tools.slice(0, VISIBLE);
        currentTbWidth = calcWidth(visibleTools);
        const h = isDynamic ? (isHoverExpanded ? 58 : 33) : 58;
        parent.postMessage({ pluginMessage: { type: "resize", width: currentTbWidth, height: h } }, "*");
      }

      if (isDynamic) {
        const expandToolbar = () => {
          if (!isHoverExpanded) {
            isHoverExpanded = true;
            tbEl.classList.add("expanded");
            parent.postMessage({ pluginMessage: { type: "resize", width: currentTbWidth, height: 58 } }, "*");
          }
        };
        const collapseToolbar = () => {
          if (isHoverExpanded) {
            isHoverExpanded = false;
            tbEl.classList.remove("expanded");
            parent.postMessage({ pluginMessage: { type: "resize", width: currentTbWidth, height: 33 } }, "*");
          }
        };
        // Expand when hovering any button
        tbEl.querySelectorAll(".tool-btn, .tool-grid-btn, .tool-btn-stacked").forEach(btn => {
          btn.addEventListener("mouseenter", expandToolbar);
        });
        // Collapse only when mouse leaves the entire toolbar
        tbEl.addEventListener("mouseleave", collapseToolbar);
      }

      // Update all icons based on iconStyle
      function updateIcons() {
        btnEls.forEach((el, i) => {
          const t = tools[i];
          if (!t) return;
          if (t.type === "grid") {
            const gridBtns = el.querySelectorAll(".tool-grid-btn");
            t.buttons.forEach((b, j) => { if (gridBtns[j]) gridBtns[j].innerHTML = getIcon(b); });
          } else {
            const ic = el.querySelector(".btn-icon");
            if (ic) ic.innerHTML = getIcon(t);
          }
        });
      }

      arrow.addEventListener("click", () => {
        expanded = !expanded;
        applyState();
      });

      // Live drag-and-drop reordering
      const elToTool = new Map();
      btnEls.forEach((el, i) => elToTool.set(el, tools[i]));

      const placeholder = document.createElement("div");
      placeholder.className = "drop-indicator";
      placeholder.style.cssText = "display:none;border:2px dashed #ccc;border-radius:6px;background:rgba(0,0,0,0.03);flex-shrink:0;box-sizing:border-box;";

      btnEls.forEach(el => {
        el.addEventListener("mousedown", e => {
          if (e.button !== 0) return;
          if (e.target.classList.contains("btn-kbd-check")) return;

          const startX = e.clientX;
          const startY = e.clientY;
          const rect = el.getBoundingClientRect();
          const offsetX = e.clientX - rect.left;
          const offsetY = e.clientY - rect.top;
          let ghost = null;
          let dragStarted = false;
          let origIdx = -1;
          const elWidth = el.offsetWidth; // save BEFORE el.remove()
          let lastSwapTime = 0;
          let lastSwapDir = null;

          function initDrag() {
            dragStarted = true;
            origIdx = btnEls.indexOf(el);

            placeholder.style.width  = el.offsetWidth  + "px";
            placeholder.style.height = el.offsetHeight + "px";
            placeholder.style.display = "flex";
            toolbar.insertBefore(placeholder, el);
            el.remove();

            ghost = el.cloneNode(true);
            const chk = ghost.querySelector(".btn-kbd-check");
            if (chk) chk.remove();
            ghost.style.position   = "fixed";
            ghost.style.pointerEvents = "none";
            ghost.style.opacity    = "0.75";
            ghost.style.zIndex     = "9999";
            ghost.style.width      = rect.width  + "px";
            ghost.style.height     = rect.height + "px";
            ghost.style.left       = rect.left   + "px";
            ghost.style.top        = rect.top    + "px";
            ghost.style.boxShadow  = "0 4px 14px rgba(0,0,0,0.18)";
            ghost.style.borderRadius = "6px";
            document.body.appendChild(ghost);
          }

          function updateDrag(e) {
            ghost.style.left = (e.clientX - offsetX) + "px";
            ghost.style.top  = (e.clientY - offsetY) + "px";

            // Find neighbours by DOM order (immune to transforms)
            let rightNeighbour = null, leftNeighbour = null, foundPh = false;
            for (const child of Array.from(toolbar.children)) {
              if (child === placeholder) { foundPh = true; continue; }
              if (child === arrow) break;
              if (!elToTool.has(child)) continue;
              if (foundPh && !rightNeighbour) rightNeighbour = child;
              if (!foundPh) leftNeighbour = child;
            }

            const ghostLeft  = e.clientX - offsetX;
            const ghostRight = ghostLeft + elWidth;
            let swapTarget = null, swapRight = false;

            if (rightNeighbour) {
              const r = rightNeighbour.getBoundingClientRect();
              if (ghostRight - r.left > r.width * 0.5) {
                swapTarget = rightNeighbour;
                swapRight = true;
              }
            }
            if (!swapTarget && leftNeighbour) {
              const r = leftNeighbour.getBoundingClientRect();
              if (r.right - ghostLeft > r.width * 0.5) {
                swapTarget = leftNeighbour;
              }
            }

            const curDir = swapTarget ? (swapRight ? 'r' : 'l') : null;
            const cooldown = (curDir && curDir === lastSwapDir) ? 20 : 150;
            if (swapTarget && Date.now() - lastSwapTime > cooldown) {
              // Clear transforms for accurate FLIP snapshot
              btnEls.forEach(btn => {
                if (btn.isConnected) { btn.style.transition = "none"; btn.style.transform = ""; }
              });
              const snap = new Map();
              btnEls.forEach(btn => {
                if (btn.isConnected) snap.set(btn, btn.getBoundingClientRect().left);
              });

              lastSwapTime = Date.now();
              lastSwapDir = curDir;

              if (swapRight) {
                toolbar.insertBefore(placeholder, swapTarget.nextSibling || arrow);
              } else {
                toolbar.insertBefore(placeholder, swapTarget);
              }

              // FLIP animate
              btnEls.forEach(btn => {
                if (!btn.isConnected || !snap.has(btn)) return;
                const dx = snap.get(btn) - btn.getBoundingClientRect().left;
                if (Math.abs(dx) < 1) return;
                btn.style.transform = `translateX(${dx}px)`;
                requestAnimationFrame(() => requestAnimationFrame(() => {
                  btn.style.transition = "transform 0.15s ease";
                  btn.style.transform = "";
                }));
              });
            }
          }

          function finalize() {
            toolbar.insertBefore(el, placeholder);
            placeholder.style.display = "none";
            if (placeholder.isConnected) placeholder.remove();
            ghost.remove();

            const newBtnEls = Array.from(toolbar.children).filter(c => elToTool.has(c));
            btnEls.splice(0, btnEls.length, ...newBtnEls);
            tools.splice(0, tools.length, ...newBtnEls.map(b => elToTool.get(b)));

            applyState();
            const order = tools.map(t => t.command || "unknown");
            parent.postMessage({ pluginMessage: { type: "saveOrder", order } }, "*");
          }

          function onMove(e) {
            if (!dragStarted) {
              if (Math.abs(e.clientX - startX) < 5 && Math.abs(e.clientY - startY) < 5) return;
              initDrag();
            }
            updateDrag(e);
          }

          function onUp() {
            document.removeEventListener("mousemove", onMove);
            document.removeEventListener("mouseup", onUp);
            if (!dragStarted) return;
            finalize();
            el.addEventListener("click", e => e.stopImmediatePropagation(), { capture: true, once: true });
          }

          document.addEventListener("mousemove", onMove);
          document.addEventListener("mouseup", onUp);
        });
      });

      if (iconStyle === "emoji") updateIcons();
      applyState();
    };
  </script>
</body>
</html>
